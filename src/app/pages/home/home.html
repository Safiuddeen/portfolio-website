<section class="min-h-screen flex items-center justify-center pt-20 bg-gray-50 dark:bg-gray-950 transition-colors duration-300">

  <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 w-full">

    <div class="flex flex-col-reverse md:flex-row items-center justify-between gap-12">

      <!-- ================= LEFT CONTENT ================= -->
      <div class="flex-1 text-center md:text-left">

        <!-- SMALL INTRO -->
        <p class="text-blue-600 dark:text-blue-400 font-semibold tracking-wide uppercase mb-2">
          Welcome to My Digital Space,
        </p>
        <p class="text-lg text-gray-700 dark:text-gray-300 font-medium mb-4">
          {{ greeting }}
        </p>

        <!-- MAIN TITLE -->
        <h1 class="text-5xl md:text-6xl font-extrabold text-gray-900 dark:text-white leading-tight mb-6">

          I am
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">
            Safi.
          </span>

          <!-- TYPED LINE -->
          <div class="mt-4">
            <span class="text-gray-700 dark:text-gray-300 text-3xl md:text-4xl font-semibold block text-left">
              <span id="typed"></span>
            </span>
          </div>

        </h1>

        <!-- DESCRIPTION -->
        <p class="text-lg text-gray-600 dark:text-gray-400 mb-8 max-w-2xl mx-auto md:mx-0">
          I build modern, responsive web applications with a focus on seamless user experiences and clean code.
        </p>

        <!-- ================= SOCIAL ICONS ROW ================= -->
        <div class="flex items-center gap-5 justify-center md:justify-start mb-6">

          <!-- Instagram -->
          <a href="https://www.instagram.com/safi__ss__/" class="text-gray-600 dark:text-gray-300 hover:text-pink-500 transition-colors">
            <img src="/instagram.png" alt="Instagram" class="w-6 h-6" />
          </a>

          <!-- LinkedIn -->
          <a href="https://www.linkedin.com/in/safiuddeen-sadoordeen-a96253208" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition-colors">
            <img src="/linkedin.png" alt="LinkedIn" class="w-6 h-6" />
          </a>


          <!-- GitHub -->
          <a href="https://github.com/Safiuddeen/" target="_blank" class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">
            <img src="/github.png" alt="GitHub" class="w-6 h-6" />
          </a>


          <!-- Contact -->
          <a href="mailto:your@email.com" class="text-gray-600 dark:text-gray-300 hover:text-green-500 transition-colors">
            <img src="/contact-us.png" alt="Contact" class="w-6 h-6" />
          </a>

        </div>

        <!-- BUTTONS -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">

          <a routerLink="/projects"
             class="px-8 py-3 rounded-full bg-blue-600 text-white font-medium hover:bg-blue-700 transition-colors shadow-lg hover:shadow-blue-500/30">
            View My Work
          </a>

          <a routerLink="/about"
             class="px-8 py-3 rounded-full border-2 border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 font-medium hover:border-blue-600 hover:text-blue-600 dark:hover:text-blue-400 dark:hover:border-blue-400 transition-colors">
            More About Me
          </a>

        </div>

      </div>

      <!-- ================= RIGHT IMAGE ================= -->
      <div class="flex-1 flex justify-center md:justify-end p-4 md:p-8">

        <div class="relative w-full max-w-sm md:max-w-md aspect-[10/12]">

          <!-- BACKGROUND GLOW -->
          <div class="absolute inset-0 bg-gradient-to-br from-blue-600/30 to-purple-600/15 rounded-3xl blur-[100px] z-0"></div>

          <!-- IMAGE CARD -->
          <div class="relative z-10 w-full h-10/12 rounded-3xl shadow-2xs">

            <img src="/my011.jpg"
                 alt="Safi Portrait"
                 class="w-full h-full rounded-3xl object-cover">

            <!-- INNER OVERLAY -->
            <div class="absolute inset-0 pointer-events-none rounded-3xl
                        shadow-[inset_0_0_80px_rgba(249,250,251,1)]
                        dark:shadow-[inset_0_0_60px_rgba(3,7,18,1)]
                        ring-1 ring-inset ring-gray-900/5 dark:ring-white/10">
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>
</section>
